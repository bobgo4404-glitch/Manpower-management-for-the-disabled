<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인사팀 장애인 고용의무 관리 (공용 워크스페이스)</title>
    
    <!-- Fonts: Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons: FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans KR"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6', // Teal
                            600: '#0d9488',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone (Strict Version 7.23.5) -->
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <style>
        /* 기본 스크롤바 스타일링 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased overflow-hidden">
    <div id="root"></div>

    <!-- Firebase SDK Setup (Modular, CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, setDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, where, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 사용자가 제공한 Firebase 설정값 적용
        const firebaseConfig = {
            apiKey: "AIzaSyD2oC31wI6LmOwyLoePDs6jT_jRxx_7oNw",
            authDomain: "esg-dashboard-f22c5.firebaseapp.com",
            projectId: "esg-dashboard-f22c5",
            storageBucket: "esg-dashboard-f22c5.firebasestorage.app",
            messagingSenderId: "573849232582",
            appId: "1:573849232582:web:104092390676f413af23c7",
            measurementId: "G-9JK2DK0TFV"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            // React 컴포넌트에서 접근할 수 있도록 전역 객체에 바인딩
            window.FB = {
                auth, db, signInAnonymously, onAuthStateChanged,
                collection, onSnapshot, addDoc, setDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, where, writeBatch, getDocs
            };

            // Firebase 준비 완료 이벤트 발송
            window.dispatchEvent(new Event('firebase-ready'));
        } catch (error) {
            console.error("Firebase 초기화 에러:", error);
            window.firebaseInitError = error;
            window.dispatchEvent(new Event('firebase-ready'));
        }
    </script>

    <!-- React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // ---------------------------------------------------------
        // 1. ErrorBoundary (필수 안전장치)
        // ---------------------------------------------------------
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught an error:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                            <div className="bg-white p-8 rounded-xl shadow-lg max-w-lg w-full text-center border-t-4 border-red-500">
                                <i className="fa-solid fa-triangle-exclamation text-5xl text-red-500 mb-4"></i>
                                <h2 className="text-2xl font-bold text-gray-800 mb-2">시스템 오류 발생</h2>
                                <p className="text-gray-600 mb-6 bg-gray-50 p-3 rounded text-sm text-left overflow-auto max-h-32">
                                    {this.state.error?.message || "알 수 없는 오류가 발생했습니다."}
                                </p>
                                <button 
                                    onClick={() => window.location.reload()}
                                    className="bg-brand-600 hover:bg-brand-700 text-white px-6 py-2 rounded-lg transition-colors font-medium shadow-sm"
                                >
                                    <i className="fa-solid fa-rotate-right mr-2"></i>새로고침
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ---------------------------------------------------------
        // 2. Constants & Utilities
        // ---------------------------------------------------------
        const COLLECTION_NAME = "global_shared_data";
        const RULE_DOC_ID = "ruleset-default";
        
        // 민감정보 최소화: 장애 분류 키
        const DISABILITY_TYPES = {
            NONE: { label: "비대상", weightKey: 0 },
            LIGHT: { label: "경증", weightKey: 1 },
            SEVERE: { label: "중증", weightKey: 2 }
        };

        const DEFAULT_RULES = {
            entityType: 'ruleSet',
            id: 'default_rule',
            obligationRate: 3.1, // 기본 의무고용률 (%)
            weightLight: 1,      // 경증 가중치
            weightSevere: 2,     // 중증 가중치
            roundMode: 'floor',  // floor(내림), round(반올림), ceil(올림)
            updatedAt: null
        };

        const formatNumber = (num) => new Intl.NumberFormat('ko-KR').format(num);
        const escapeCsvCell = (value) => {
            const text = String(value ?? "");
            if (/[",\n]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
            return text;
        };
        const normalizeDisabilityType = (value) => {
            const v = String(value || "").trim().toUpperCase();
            if (["SEVERE", "중증", "PRIORITY"].includes(v)) return "SEVERE";
            if (["LIGHT", "경증", "BASIC"].includes(v)) return "LIGHT";
            return "NONE";
        };

        const calculateQuota = (totalEmp, rate, mode) => {
            const raw = totalEmp * (rate / 100);
            if (mode === 'ceil') return Math.ceil(raw);
            if (mode === 'round') return Math.round(raw);
            return Math.floor(raw); // default: floor
        };

        // ---------------------------------------------------------
        // 3. UI Components
        // ---------------------------------------------------------
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const colors = {
                success: "bg-green-600",
                error: "bg-red-600",
                info: "bg-blue-600"
            };
            const icons = {
                success: "fa-check-circle",
                error: "fa-circle-exclamation",
                info: "fa-info-circle"
            };

            return (
                <div className={`fixed bottom-4 right-4 ${colors[type] || colors.info} text-white px-4 py-3 rounded-lg shadow-lg flex items-center space-x-3 z-50 animate-bounce-short`}>
                    <i className={`fa-solid ${icons[type] || icons.info}`}></i>
                    <span>{message}</span>
                    <button onClick={onClose} className="ml-2 opacity-70 hover:opacity-100"><i className="fa-solid fa-xmark"></i></button>
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-xl max-w-sm w-full overflow-hidden transform transition-all">
                        <div className="p-5">
                            <h3 className="text-lg font-bold text-gray-900 mb-2">{title}</h3>
                            <p className="text-gray-600 text-sm">{message}</p>
                        </div>
                        <div className="bg-gray-50 px-5 py-3 flex justify-end space-x-2">
                            <button onClick={onCancel} className="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
                                취소
                            </button>
                            <button onClick={onConfirm} className="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700">
                                확인
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ---------------------------------------------------------
        // 4. Views (Pages)
        // ---------------------------------------------------------

        // --- View: Dashboard ---
        const Dashboard = ({ employees, rules, hiringPlans }) => {
            // 현재 현황 계산
            const totalEmp = employees.length;
            const requiredQuota = calculateQuota(totalEmp, rules.obligationRate, rules.roundMode);
            
            let currentWeightCount = 0;
            let currentDisabledPersons = 0;

            employees.forEach(emp => {
                if (emp.disabilityType !== 'NONE') {
                    currentDisabledPersons++;
                    currentWeightCount += emp.disabilityType === 'SEVERE' ? rules.weightSevere : rules.weightLight;
                }
            });

            const gap = currentWeightCount - requiredQuota;
            const isFulfilled = gap >= 0;
            const achievement = ((currentWeightCount / (requiredQuota || 1)) * 100);

            // 시뮬레이션 (채용 계획 반영)
            const futureTotalEmp = totalEmp + hiringPlans.reduce((sum, p) => sum + Number(p.totalCount || 0), 0);
            const futureRequired = calculateQuota(futureTotalEmp, rules.obligationRate, rules.roundMode);
            
            let futureWeightCount = currentWeightCount;
            hiringPlans.forEach(p => {
                if (p.disabilityType !== 'NONE') {
                    const w = p.disabilityType === 'SEVERE' ? rules.weightSevere : rules.weightLight;
                    futureWeightCount += (Number(p.disabledCount || 0) * w);
                }
            });
            const futureGap = futureWeightCount - futureRequired;

            const composition = {
                none: employees.filter((e) => e.disabilityType === "NONE").length,
                light: employees.filter((e) => e.disabilityType === "LIGHT").length,
                severe: employees.filter((e) => e.disabilityType === "SEVERE").length,
            };
            const compositionTotal = composition.none + composition.light + composition.severe || 1;

            const deptRows = Object.entries(
                employees.reduce((acc, emp) => {
                    const dept = emp.dept || "미지정";
                    const weight =
                        emp.disabilityType === "SEVERE" ? Number(rules.weightSevere || 2)
                        : emp.disabilityType === "LIGHT" ? Number(rules.weightLight || 1)
                        : 0;
                    if (!acc[dept]) acc[dept] = { headcount: 0, weighted: 0 };
                    acc[dept].headcount += 1;
                    acc[dept].weighted += weight;
                    return acc;
                }, {})
            )
                .map(([dept, v]) => ({ dept, ...v }))
                .sort((a, b) => b.weighted - a.weighted)
                .slice(0, 6);
            const maxDeptWeight = Math.max(...deptRows.map((r) => r.weighted), 1);

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-end">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-800">통합 대시보드</h1>
                            <p className="text-sm text-gray-500 mt-1">실시간 공용 데이터 기반 산정 현황</p>
                        </div>
                        <div className="text-right text-xs text-gray-400 bg-white p-2 rounded border border-gray-200 shadow-sm">
                            <span className="block font-semibold text-gray-600 mb-1"><i className="fa-solid fa-scale-balanced mr-1"></i>적용 룰셋</span>
                            의무율: <span className="text-brand-600 font-bold">{rules.obligationRate}%</span> | 
                            중증가중: <span className="text-brand-600 font-bold">x{rules.weightSevere}</span> |
                            산정: <span className="text-brand-600 font-bold">{rules.roundMode === 'floor' ? '내림' : rules.roundMode === 'ceil' ? '올림' : '반올림'}</span>
                        </div>
                    </div>

                    {/* KPI Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-blue-500">
                            <h3 className="text-sm font-medium text-gray-500">총 상시근로자</h3>
                            <div className="mt-2 flex items-baseline gap-2">
                                <span className="text-3xl font-bold text-gray-900">{formatNumber(totalEmp)}</span>
                                <span className="text-sm text-gray-500">명</span>
                            </div>
                        </div>
                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-purple-500">
                            <h3 className="text-sm font-medium text-gray-500">의무 고용 인원</h3>
                            <div className="mt-2 flex items-baseline gap-2">
                                <span className="text-3xl font-bold text-gray-900">{formatNumber(requiredQuota)}</span>
                                <span className="text-sm text-gray-500">명</span>
                            </div>
                            <p className="text-xs text-gray-400 mt-1">({totalEmp} × {rules.obligationRate}%)</p>
                        </div>
                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 border-l-4 border-l-teal-500">
                            <h3 className="text-sm font-medium text-gray-500">현재 인정 인원 (가중치)</h3>
                            <div className="mt-2 flex items-baseline gap-2">
                                <span className="text-3xl font-bold text-gray-900">{formatNumber(currentWeightCount)}</span>
                                <span className="text-sm text-gray-500">명</span>
                            </div>
                            <p className="text-xs text-gray-400 mt-1">(실인원: {currentDisabledPersons}명)</p>
                        </div>
                        <div className={`bg-white p-5 rounded-xl shadow-sm border border-gray-100 border-l-4 ${isFulfilled ? 'border-l-green-500' : 'border-l-red-500'}`}>
                            <h3 className="text-sm font-medium text-gray-500">충족 여부 (Gap)</h3>
                            <div className="mt-2 flex items-baseline gap-2">
                                <span className={`text-3xl font-bold ${isFulfilled ? 'text-green-600' : 'text-red-600'}`}>
                                    {gap > 0 ? '+' : ''}{formatNumber(gap)}
                                </span>
                                <span className="text-sm text-gray-500">명</span>
                            </div>
                            <p className={`text-xs mt-1 font-medium ${isFulfilled ? 'text-green-500' : 'text-red-500'}`}>
                                {isFulfilled ? <><i className="fa-solid fa-check-circle mr-1"></i>의무 달성</> : <><i className="fa-solid fa-triangle-exclamation mr-1"></i>미달 (부담금 리스크)</>}
                            </p>
                        </div>
                    </div>

                    {/* Chart & Simulation Summary */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4"><i className="fa-solid fa-chart-pie mr-2 text-brand-500"></i>충족률 시각화</h3>
                            <div className="relative pt-4">
                                <div className="flex justify-between mb-2 text-sm font-medium">
                                    <span className="text-brand-600">현재 {currentWeightCount}명</span>
                                    <span className="text-gray-500">목표 {requiredQuota}명</span>
                                </div>
                                <div className="overflow-hidden h-6 mb-4 text-xs flex rounded-full bg-gray-100">
                                    <div style={{ width: `${Math.min((currentWeightCount / (requiredQuota || 1)) * 100, 100)}%` }} 
                                         className={`shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center ${isFulfilled ? 'bg-green-500' : 'bg-red-500'} transition-all duration-1000`}>
                                    </div>
                                </div>
                                <p className="text-sm text-gray-600 text-center">
                                    목표 대비 <span className="font-bold">{achievement.toFixed(1)}%</span> 달성
                                </p>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4"><i className="fa-solid fa-forward-fast mr-2 text-brand-500"></i>채용 계획 반영 시뮬레이션</h3>
                            <div className="space-y-3">
                                <div className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                    <span className="text-sm text-gray-600">예상 총 근로자</span>
                                    <span className="font-semibold text-gray-900">{formatNumber(futureTotalEmp)}명 <span className="text-xs text-blue-500">(+{futureTotalEmp - totalEmp})</span></span>
                                </div>
                                <div className="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                                    <span className="text-sm text-gray-600">예상 인정 인원</span>
                                    <span className="font-semibold text-gray-900">{formatNumber(futureWeightCount)}명 <span className="text-xs text-blue-500">(+{futureWeightCount - currentWeightCount})</span></span>
                                </div>
                                <div className={`flex justify-between items-center p-3 rounded-lg border ${futureGap >= 0 ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                    <span className="text-sm font-bold text-gray-700">예상 Gap</span>
                                    <span className={`font-bold text-lg ${futureGap >= 0 ? 'text-green-700' : 'text-red-700'}`}>
                                        {futureGap > 0 ? '+' : ''}{formatNumber(futureGap)}명
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Additional charts */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">
                                <i className="fa-solid fa-layer-group mr-2 text-brand-500"></i>장애 구분 구성 비율
                            </h3>
                            <div className="space-y-3">
                                <div>
                                    <div className="flex justify-between text-sm mb-1">
                                        <span className="text-gray-600">비대상</span>
                                        <span className="font-semibold text-gray-700">{composition.none}명</span>
                                    </div>
                                    <div className="h-2.5 rounded-full bg-gray-100 overflow-hidden">
                                        <div className="h-full bg-gray-400" style={{ width: `${(composition.none / compositionTotal) * 100}%` }} />
                                    </div>
                                </div>
                                <div>
                                    <div className="flex justify-between text-sm mb-1">
                                        <span className="text-gray-600">경증</span>
                                        <span className="font-semibold text-blue-700">{composition.light}명</span>
                                    </div>
                                    <div className="h-2.5 rounded-full bg-gray-100 overflow-hidden">
                                        <div className="h-full bg-blue-500" style={{ width: `${(composition.light / compositionTotal) * 100}%` }} />
                                    </div>
                                </div>
                                <div>
                                    <div className="flex justify-between text-sm mb-1">
                                        <span className="text-gray-600">중증</span>
                                        <span className="font-semibold text-purple-700">{composition.severe}명</span>
                                    </div>
                                    <div className="h-2.5 rounded-full bg-gray-100 overflow-hidden">
                                        <div className="h-full bg-purple-500" style={{ width: `${(composition.severe / compositionTotal) * 100}%` }} />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 mb-4">
                                <i className="fa-solid fa-chart-column mr-2 text-brand-500"></i>부서별 가중 인정 인원
                            </h3>
                            <div className="space-y-3">
                                {!deptRows.length && <p className="text-sm text-gray-500">표시할 데이터가 없습니다.</p>}
                                {deptRows.map((row) => (
                                    <div key={row.dept}>
                                        <div className="flex justify-between text-sm mb-1">
                                            <span className="text-gray-600 truncate pr-3">{row.dept}</span>
                                            <span className="font-semibold text-gray-800">{row.weighted.toFixed(1)}</span>
                                        </div>
                                        <div className="h-2.5 rounded-full bg-gray-100 overflow-hidden">
                                            <div className="h-full bg-brand-500" style={{ width: `${(row.weighted / maxDeptWeight) * 100}%` }} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- View: Employees ---
        const EmployeeManager = ({ employees, onAdd, onDelete, onUpdate }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterType, setFilterType] = useState('ALL');
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', empNo: '', dept: '', disabilityType: 'NONE' });
            const [editingId, setEditingId] = useState(null);

            const filtered = employees.filter(emp => {
                const matchSearch = emp.name.includes(searchTerm) || emp.empNo.includes(searchTerm) || emp.dept.includes(searchTerm);
                const matchType = filterType === 'ALL' ? true : 
                                  filterType === 'DISABLED' ? emp.disabilityType !== 'NONE' :
                                  emp.disabilityType === filterType;
                return matchSearch && matchType;
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editingId) {
                    onUpdate(editingId, { ...formData });
                } else {
                    onAdd({ entityType: 'employee', ...formData });
                }
                setIsFormOpen(false);
                setFormData({ name: '', empNo: '', dept: '', disabilityType: 'NONE' });
                setEditingId(null);
            };

            return (
                <div className="space-y-4 animate-fade-in flex flex-col h-full">
                    <div className="flex justify-between items-center shrink-0">
                        <div>

                                    <label className="block text-xs text-gray-500 mb-1">성명 (마스킹 권장)</label>

                                </div>
                                <div>
                                    <label className="block text-xs text-gray-500 mb-1">사번</label>
                                    <input required type="text" value={formData.empNo} onChange={e=>setFormData({...formData, empNo: e.target.value})} className="w-full text-sm p-2 border border-gray-300 rounded focus:outline-none focus:border-brand-500" placeholder="EMP001"/>
                                </div>
                                <div>
                                    <label className="block text-xs text-gray-500 mb-1">소속(부서)</label>
                                    <input required type="text" value={formData.dept} onChange={e=>setFormData({...formData, dept: e.target.value})} className="w-full text-sm p-2 border border-gray-300 rounded focus:outline-none focus:border-brand-500" placeholder="개발팀"/>

                                <div>

                                    <select value={formData.disabilityType} onChange={e=>setFormData({...formData, disabilityType: e.target.value})} className="w-full text-sm p-2 border border-gray-300 rounded focus:outline-none focus:border-brand-500 bg-white">
                                        <option value="NONE">비대상</option>
                                        <option value="LIGHT">경증 (1배수 적용)</option>
                                        <option value="SEVERE">중증 (2배수 적용)</option>

                                <div>
                                    <button type="submit" className="w-full bg-gray-800 text-white p-2 rounded text-sm hover:bg-gray-900 transition-colors">
